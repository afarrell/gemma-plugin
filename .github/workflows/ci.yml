name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint plugin manifest and scripts
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin.json manifests
        run: |
          set -euo pipefail
          shopt -s nullglob
          found=0
          for f in plugins/*/.claude-plugin/plugin.json; do
            found=1
            echo "::group::$f"
            # Valid JSON
            jq empty "$f"
            # Required fields
            jq -e '.name and .version and .description' "$f" > /dev/null \
              || { echo "::error file=$f::missing required field (name|version|description)"; exit 1; }
            # Semver on version
            ver=$(jq -r '.version' "$f")
            if ! echo "$ver" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
              echo "::error file=$f::version '$ver' is not valid semver (MAJOR.MINOR.PATCH[-pre])"
              exit 1
            fi
            echo "  name=$(jq -r '.name' "$f") version=$ver"
            echo "::endgroup::"
          done
          if [ "$found" = "0" ]; then
            echo "::error::no plugin.json files found under plugins/*/.claude-plugin/"
            exit 1
          fi

      - name: Syntax-check companion scripts
        run: |
          set -euo pipefail
          shopt -s nullglob globstar
          found=0
          for f in plugins/**/*.mjs plugins/**/*.js; do
            found=1
            echo "::group::node --check $f"
            node --check "$f"
            echo "::endgroup::"
          done
          if [ "$found" = "0" ]; then
            echo "no .mjs/.js under plugins/ — skipping syntax check"
          fi
